<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | ElectroMartBD</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-color: #030712;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(31, 41, 55, 0.8);
      --accent: #00d1ff;
      --accent-hover: #00e5ff;
      --accent-glow: rgba(0, 209, 255, 0.3);
      --text-main: #f9fafb;
      --text-dim: #9ca3af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 209, 255, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 209, 255, 0.04), transparent 25%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav h1 {
      color: var(--text-main);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav h1 a {
      color: inherit;
      text-decoration: none;
    }

    nav h1 span {
      background: linear-gradient(135deg, #00d1ff, #0088ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding-right: 2px;
    }

    .container {
      max-width: 1000px;
      margin: 60px auto;
      padding: 20px 5%;
      flex-grow: 1;
      width: 100%;
    }

    .back-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 30px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      text-shadow: 0 0 10px var(--accent-glow);
      transform: translateX(-5px);
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .product-image {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .product-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.5s ease;
    }

    .product-image:hover img {
      transform: scale(1.05);
    }

    .product-details {
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffffff, #a0a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .product-price {
      font-size: 2rem;
      color: var(--accent);
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .product-price span {
      font-size: 1rem;
      color: var(--text-dim);
      font-weight: 400;
      text-decoration: line-through;
    }

    .product-desc {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.7;
    }

    .features-list {
      margin-bottom: 40px;
      list-style: none;
    }

    .features-list li {
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text-main);
    }

    .features-list li::before {
      content: '✓';
      color: var(--accent);
      font-weight: bold;
    }

    .order-btn {
      background: linear-gradient(135deg, #00d1ff, #0088ff);
      color: #000;
      padding: 16px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      border: none;
      cursor: pointer;
    }

    .order-btn:hover {
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translateY(-3px);
      filter: brightness(1.1);
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .error-container {
      text-align: center;
      padding: 100px 20px;
    }

    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        padding: 20px;
      }
      .product-image {
        height: 300px;
      }
      .product-title {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <h1><a href="index.html">ElectroMart<span>BD</span></a></h1>
    <div style="display: flex; align-items: center; gap: 8px; font-weight: 600; font-family: 'Outfit', sans-serif; background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 99px; border: 1px solid rgba(255, 255, 255, 0.1);">📞 01998421007</div>
  </nav>

  <div class="container" id="main-content">
    <a href="index.html" class="back-link">← Back to Catalog</a>
    
    <div id="product-view">
      <!-- Injected by JS -->
    </div>
  </div>

  <footer>
    <p>© 2026 ElectroMartBD | Designed with precision for builders</p>
  </footer>

  <script src="products.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Get product ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      
      const productView = document.getElementById("product-view");

      if (!productId) {
        showError("No product specified.");
        return;
      }

      // Fetch product from data
      const product = getProductById(productId);

      if (!product) {
        showError("Product not found.");
        return;
      }

      // Render product
      renderProduct(product);

      function showError(msg) {
        document.title = "Not Found | ElectroMartBD";
        productView.innerHTML = `
          <div class="error-container">
            <h2>${msg}</h2>
            <p style="color: var(--text-dim); margin-top: 10px;">Please return to the catalog and try again.</p>
          </div>
        `;
      }

      function renderProduct(p) {
        document.title = `${p.name} | ElectroMartBD`;
        
        // Render features
        const featuresHtml = p.features.map(f => `<li>${f}</li>`).join('');
        
        // WhatsApp Message
        const waMessage = encodeURIComponent(`Hello! I want to order: ${p.name}`);

        productView.innerHTML = `
          <div class="product-grid">
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}">
            </div>
            
            <div class="product-details">
              <h2 class="product-title">${p.name}</h2>
              <div class="product-price">${p.price}</div>
              
              <div class="product-desc">
                <p>${p.fullDesc}</p>
              </div>
              
              <h3 style="margin-bottom: 15px; font-size: 1.2rem; color: #fff;">Key Features:</h3>
              <ul class="features-list">
                ${featuresHtml}
              </ul>
              
              <div style="margin-top: auto;">
                <a href="https://wa.me/8801998421007?text=${waMessage}" target="_blank" class="order-btn">
                   Order via WhatsApp
                </a>
              </div>
            </div>
          </div>
        `;
      }
    });
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title and meta tags are injected by JS after product loads -->
  <title>Product | ElectroMartBD</title>

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ── Product page layout ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1000px;
      margin: 60px auto;
      padding: 20px 5%;
      flex-grow: 1;
      width: 100%;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
      font-size: 0.9rem;
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .breadcrumb a:hover { opacity: 0.8; }
    .breadcrumb .sep    { color: var(--text-dim); }
    .breadcrumb .current { color: var(--text-main); }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .product-image {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .product-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.5s ease;
    }

    .product-image:hover img { transform: scale(1.05); }

    .product-details {
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffffff, #a0a0a0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .product-price {
      font-size: 2rem;
      color: var(--accent);
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 24px;
    }

    .product-desc {
      color: var(--text-dim);
      font-size: 1rem;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .features-heading {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 14px;
    }

    .features-list {
      margin-bottom: 36px;
      list-style: none;
    }

    .features-list li {
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text-main);
      font-size: 0.95rem;
    }

    .features-list li::before {
      content: '✓';
      color: var(--accent);
      font-weight: bold;
      flex-shrink: 0;
    }

    .order-btn {
      background: linear-gradient(135deg, #00d1ff, #0088ff);
      color: #000;
      padding: 16px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .order-btn:hover {
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translateY(-3px);
      filter: brightness(1.1);
    }

    /* ── Skeleton ── */
    .skeleton-product {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
    }

    .skeleton-block {
      background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Error ── */
    .error-container {
      text-align: center;
      padding: 100px 20px;
    }

    .error-container h2 { margin-bottom: 10px; }

    @media (max-width: 768px) {
      .product-grid, .skeleton-product {
        grid-template-columns: 1fr;
        padding: 24px;
        gap: 30px;
      }
      .product-image { height: 280px; }
      .product-title { font-size: 1.8rem; }
    }
  </style>
</head>

<body>

  <header>
    <div id="site-nav"></div>
  </header>

  <div class="container" id="main-content">

    <!-- Breadcrumb (populated by JS) -->
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

    <!-- Skeleton loader -->
    <div class="skeleton-product" id="skeleton" aria-hidden="true">
      <div class="skeleton-block" style="height:400px;"></div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="skeleton-block" style="height:40px;width:80%;"></div>
        <div class="skeleton-block" style="height:30px;width:40%;"></div>
        <div class="skeleton-block" style="height:80px;"></div>
        <div class="skeleton-block" style="height:20px;"></div>
        <div class="skeleton-block" style="height:20px;width:90%;"></div>
        <div class="skeleton-block" style="height:20px;width:75%;"></div>
      </div>
    </div>

    <!-- Product content (populated by JS) -->
    <div id="product-view"></div>

  </div>

  <footer>
    <p>© 2026 ElectroMartBD | Designed with precision for builders</p>
  </footer>

  <!-- Floating WhatsApp Button -->
  <a class="whatsapp-float" href="https://wa.me/8801998421007" target="_blank" rel="noopener noreferrer" aria-label="Chat with us on WhatsApp">
    <span aria-hidden="true">💬</span>
  </a>

  <script src="nav.js"></script>
  <script src="products.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const skeleton    = document.getElementById("skeleton");
      const productView = document.getElementById("product-view");
      const breadcrumb  = document.getElementById("breadcrumb");

      // ── Validate and retrieve product ID ──────────────────────
      const urlParams = new URLSearchParams(window.location.search);
      const rawId     = urlParams.get('id') || "";
      const productId = /^[a-z0-9_]+$/i.test(rawId) ? rawId : null;

      if (!productId) {
        showError("No product specified.");
        return;
      }

      const product = getProductById(productId);

      if (!product) {
        showError("Product not found.");
        return;
      }

      // Small delay so skeleton is visible while page hydrates
      setTimeout(() => {
        skeleton.style.display = "none";
        renderBreadcrumb(product);
        renderProduct(product);
      }, 150);

      // ── Breadcrumb ────────────────────────────────────────────
      function renderBreadcrumb(p) {
        // Find category name
        let catName = "";
        for (const cat of productsData) {
          if (cat.items.find(i => i.id === p.id)) { catName = cat.category; break; }
        }

        breadcrumb.innerHTML = `
          <a href="index.html">Home</a>
          <span class="sep" aria-hidden="true">›</span>
          <a href="index.html">${sanitize(catName)}</a>
          <span class="sep" aria-hidden="true">›</span>
          <span class="current" aria-current="page">${sanitize(p.name)}</span>
        `;
      }

      // ── SEO meta injection ────────────────────────────────────
      function injectMeta(p) {
        const canonical = document.createElement('link');
        canonical.rel  = "canonical";
        canonical.href = `https://electromartbd.com/product.html?id=${encodeURIComponent(p.id)}`;
        document.head.appendChild(canonical);

        const setMeta = (name, content, prop = false) => {
          const el = document.createElement('meta');
          if (prop) el.setAttribute('property', name); else el.name = name;
          el.content = content;
          document.head.appendChild(el);
        };

        document.title = `${p.name} | ElectroMartBD`;
        setMeta("description", p.shortDesc);
        setMeta("og:title",       `${p.name} | ElectroMartBD`, true);
        setMeta("og:description", p.shortDesc, true);
        setMeta("og:type",        "product", true);
        setMeta("og:url",         `https://electromartbd.com/product.html?id=${encodeURIComponent(p.id)}`, true);
        setMeta("og:image",       `https://electromartbd.com/${p.image.replace('./', '')}`, true);
        setMeta("twitter:card",   "summary_large_image", true);
        setMeta("twitter:title",  `${p.name} | ElectroMartBD`, true);

        // Product JSON-LD
        const jsonLd = document.createElement('script');
        jsonLd.type = "application/ld+json";
        jsonLd.text = JSON.stringify({
          "@context": "https://schema.org/",
          "@type": "Product",
          "name": p.name,
          "image": `https://electromartbd.com/${p.image.replace('./', '')}`,
          "description": p.shortDesc,
          "sku": p.id,
          "offers": {
            "@type": "Offer",
            "url": `https://electromartbd.com/product.html?id=${encodeURIComponent(p.id)}`,
            "priceCurrency": "BDT",
            "price": p.price.replace(/[^0-9]/g, ''),
            "availability": "https://schema.org/InStock"
          }
        });
        document.head.appendChild(jsonLd);
      }

      // ── Render product ────────────────────────────────────────
      function renderProduct(p) {
        injectMeta(p);

        const waMessage = encodeURIComponent(`Hello! I want to order: ${p.name} (৳${p.price})`);

        // Build DOM using safe methods (no innerHTML with user data)
        const grid = document.createElement("div");
        grid.className = "product-grid";

        // — Image column —
        const imgWrap = document.createElement("div");
        imgWrap.className = "product-image";

        const img = document.createElement("img");
        img.src     = p.image;
        img.alt     = sanitize(p.name);
        img.loading = "eager"; // above-fold: load immediately
        img.width   = 500;
        img.height  = 400;
        img.onerror = function() {
          this.parentElement.innerHTML = '<div style="font-size:4rem;display:flex;align-items:center;justify-content:center;height:100%;">📦</div>';
        };
        imgWrap.appendChild(img);

        // — Details column —
        const details = document.createElement("div");
        details.className = "product-details";

        const title = document.createElement("h2");
        title.className   = "product-title";
        title.textContent = p.name;

        const price = document.createElement("div");
        price.className   = "product-price";
        price.textContent = p.price;

        const desc = document.createElement("div");
        desc.className   = "product-desc";
        desc.textContent = p.fullDesc;

        const featHeading = document.createElement("h3");
        featHeading.className   = "features-heading";
        featHeading.textContent = "Key Features:";

        const featList = document.createElement("ul");
        featList.className = "features-list";
        p.features.forEach(f => {
          const li = document.createElement("li");
          li.textContent = f;
          featList.appendChild(li);
        });

        const orderBtn = document.createElement("a");
        orderBtn.className  = "order-btn";
        orderBtn.href       = `https://wa.me/8801998421007?text=${waMessage}`;
        orderBtn.target     = "_blank";
        orderBtn.rel        = "noopener noreferrer";
        orderBtn.innerHTML  = `<span aria-hidden="true">💬</span> Order via WhatsApp`;

        details.appendChild(title);
        details.appendChild(price);
        details.appendChild(desc);
        details.appendChild(featHeading);
        details.appendChild(featList);
        details.appendChild(orderBtn);

        grid.appendChild(imgWrap);
        grid.appendChild(details);
        productView.appendChild(grid);
      }

      // ── Error state ───────────────────────────────────────────
      function showError(msg) {
        document.title = "Not Found | ElectroMartBD";
        skeleton.style.display = "none";
        breadcrumb.innerHTML = `<a href="index.html">Home</a> <span aria-hidden="true">›</span> <span class="current">Not Found</span>`;
        productView.innerHTML = `
          <div class="error-container">
            <h2>${sanitize(msg)}</h2>
            <p style="color:var(--text-dim);margin-top:10px;">Please return to the catalog and try again.</p>
            <a href="index.html" class="btn" style="display:inline-flex;margin-top:30px;">← Back to Catalog</a>
          </div>`;
      }
    });
  </script>

</body>
</html>
